user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rid="$http_x_request_id" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens     off;
    client_max_body_size 25m;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limit zones (used in vhost)
    limit_req_zone $binary_remote_addr zone=api:10m   rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m  rate=2r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=4r/s;

    # Trust X-Forwarded-* from Cloudflare / loopback (set CF ranges in prod)
    set_real_ip_from 127.0.0.1/32;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    include /etc/nginx/conf.d/*.conf;
}
